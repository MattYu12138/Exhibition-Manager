services:
  # ─────────────────────────────────────────────
  # Shared SQLite database volume
  # All backend services mount /data/lic to access LIC_DB.db
  # ─────────────────────────────────────────────

  # ─────────────────────────────────────────────
  # Exhibition Manager
  # ─────────────────────────────────────────────
  exhibition-backend:
    build: ./exhibition-backend
    restart: always
    env_file:
      - ./exhibition-backend/.env
    environment:
      - DB_PATH=/data/lic/database/LIC_DB.db
    volumes:
      - /data/lic:/data/lic
      - ./exhibition-frontend/dist:/frontend/dist:ro
    ports:
      - '127.0.0.1:3001:3001'

  # ─────────────────────────────────────────────
  # Platform (Main Entry)
  # ─────────────────────────────────────────────
  platform-backend:
    build: ./platform-backend
    restart: always
    env_file:
      - ./platform-backend/.env
    environment:
      - DB_PATH=/data/lic/database/LIC_DB.db
    volumes:
      - /data/lic:/data/lic
    ports:
      - '127.0.0.1:3000:3000'

  platform-frontend:
    build: ./platform-frontend
    restart: always
    ports:
      - '127.0.0.1:8080:80'
    depends_on:
      - platform-backend

  # ─────────────────────────────────────────────
  # Inventory Manager
  # ─────────────────────────────────────────────
  inventory-backend:
    build: ./inventory-backend
    restart: always
    env_file:
      - ./inventory-backend/.env
    environment:
      - DB_PATH=/data/lic/database/LIC_DB.db
    volumes:
      - /data/lic:/data/lic
    ports:
      - '127.0.0.1:3002:3002'
    depends_on:
      - platform-backend

  inventory-frontend:
    build: ./inventory-frontend
    restart: always
    ports:
      - '127.0.0.1:8082:80'
    depends_on:
      - inventory-backend
