services:
  # ─────────────────────────────────────────────
  # Shared SQLite database volume
  # All backend services mount /data/lic to access LIC_DB.db
  # ─────────────────────────────────────────────

  # ─────────────────────────────────────────────
  # Exhibition Manager
  # ─────────────────────────────────────────────
  exhibition-backend:
    build: ./exhibition-backend
    restart: always
    env_file:
      - ./exhibition-backend/.env
    environment:
      - DB_PATH=/data/lic/database/LIC_DB.db
      # Docker 内部服务间通信地址（容器名:内部端口）
      - PLATFORM_BACKEND_URL=http://platform-backend:3000
      - SSO_SECRET=lummi-sso-secret-2026
    volumes:
      - /data/lic:/data/lic
    ports:
      - '127.0.0.1:3001:3001'
    depends_on:
      - platform-backend

  exhibition-frontend:
    build:
      context: ./exhibition-frontend
      args:
        VITE_PLATFORM_URL: https://licplatform.lummiincolour.com.au
    restart: always
    ports:
      - '127.0.0.1:8081:80'
    depends_on:
      - exhibition-backend

  # ─────────────────────────────────────────────
  # Platform (Main Entry)
  # ─────────────────────────────────────────────
  platform-backend:
    build: ./platform-backend
    restart: always
    env_file:
      - ./platform-backend/.env
    environment:
      - DB_PATH=/data/lic/database/LIC_DB.db
      - SSO_SECRET=lummi-sso-secret-2026
      - PORT=3000
    volumes:
      - /data/lic:/data/lic
    ports:
      - '127.0.0.1:3000:3000'

  platform-frontend:
    build: ./platform-frontend
    restart: always
    ports:
      - '127.0.0.1:8080:80'
    depends_on:
      - platform-backend

  # ─────────────────────────────────────────────
  # Inventory Manager
  # ─────────────────────────────────────────────
  inventory-backend:
    build: ./inventory-backend
    restart: always
    env_file:
      - ./inventory-backend/.env
    environment:
      - DB_PATH=/data/lic/database/LIC_DB.db
      # Docker 内部服务间通信地址（容器名:内部端口）
      - PLATFORM_BACKEND_URL=http://platform-backend:3000
      - SSO_SECRET=lummi-sso-secret-2026
    volumes:
      - /data/lic:/data/lic
    ports:
      - '127.0.0.1:3002:3002'
    depends_on:
      - platform-backend

  inventory-frontend:
    build:
      context: ./inventory-frontend
      args:
        VITE_PLATFORM_URL: https://licplatform.lummiincolour.com.au
    restart: always
    ports:
      - '127.0.0.1:8082:80'
    depends_on:
      - inventory-backend
